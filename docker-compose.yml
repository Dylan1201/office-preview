version: '3.8'

services:
  vue-office-preview:
    build:
      context: .
      dockerfile: Dockerfile
    image: vue3-office-preview:latest
    container_name: vue-office-preview
    ports:
      - "3000:80"
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    volumes:
      # 可选：挂载 nginx 配置
      - ./examples/vue3-demo/nginx.conf:/etc/nginx/nginx.conf:ro
